<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, initial-scale=1">
<title>Maison V&eacute;raux &mdash; Fragrance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,400;6..96,500;6..96,700&family=Cormorant:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;background:#0A0A0A;}
  *{box-sizing:border-box;}
  .frame{
    position:relative;width:1280px;height:800px;overflow:hidden;
    background:#0c0a08;
    font-family:"Cormorant","Times New Roman",serif;
    color:#EAE0CF;
    isolation:isolate;
  }

  /* ===== Base cinematic lighting ===== */
  .scene{position:absolute;inset:0;}

  /* deep warm base */
  .layer-base{
    position:absolute;inset:0;
    background:
      radial-gradient(120% 90% at 62% 38%, #2a1c0c 0%, #18110a 40%, #0c0907 70%, #060504 100%);
  }

  /* volumetric gold key light, raking from upper-right */
  .layer-key{
    position:absolute;inset:-10%;
    background:
      radial-gradient(46% 60% at 70% 30%, rgba(214,168,86,0.55) 0%, rgba(190,140,60,0.22) 32%, rgba(120,80,30,0.05) 55%, transparent 72%);
    mix-blend-mode:screen;
    filter:blur(6px);
  }

  /* warm fill bouncing low-left */
  .layer-fill{
    position:absolute;inset:0;
    background:
      radial-gradient(50% 50% at 20% 86%, rgba(150,92,40,0.30) 0%, rgba(90,55,25,0.10) 45%, transparent 70%);
    mix-blend-mode:screen;
  }

  /* ===== Abstract subject: a glowing perfume flacon silhouette built from gradients + light streaks ===== */
  .subject{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) scale(1.04);width:520px;height:640px;}

  /* tall liquid-glass column */
  .flacon{
    position:absolute;left:50%;top:52%;transform:translate(-50%,-50%);
    width:230px;height:430px;border-radius:26px 26px 18px 18px;
    background:
      linear-gradient(180deg, rgba(255,236,196,0.10) 0%, rgba(170,120,60,0.16) 28%, rgba(60,40,20,0.30) 60%, rgba(30,20,10,0.42) 100%);
    box-shadow:
      inset 28px 0 60px -30px rgba(255,238,200,0.85),
      inset -40px 0 80px -30px rgba(0,0,0,0.65),
      inset 0 60px 80px -40px rgba(255,228,180,0.55),
      0 60px 120px -30px rgba(0,0,0,0.6);
    backdrop-filter:blur(1px);
  }
  /* specular vertical highlight on the glass */
  .flacon::before{
    content:"";position:absolute;left:30px;top:30px;width:26px;height:330px;border-radius:20px;
    background:linear-gradient(180deg, rgba(255,247,224,0.92), rgba(255,224,170,0.25) 55%, transparent);
    filter:blur(3px);
  }
  /* liquid level glow inside */
  .flacon::after{
    content:"";position:absolute;left:18px;right:18px;bottom:18px;height:180px;border-radius:14px;
    background:radial-gradient(80% 100% at 50% 100%, rgba(255,196,110,0.55), rgba(190,120,50,0.18) 60%, transparent);
    filter:blur(2px);
  }
  /* metallic cap */
  .cap{
    position:absolute;left:50%;top:calc(52% - 215px - 36px);transform:translate(-50%,0);
    width:120px;height:78px;border-radius:6px 6px 4px 4px;
    background:linear-gradient(180deg,#5a4220 0%, #d9b25e 22%, #f7e6b0 38%, #b98a3e 60%, #4a3417 100%);
    box-shadow:0 18px 40px -14px rgba(0,0,0,0.7), inset 0 2px 2px rgba(255,255,255,0.4);
  }
  .cap::after{
    content:"";position:absolute;left:50%;bottom:-14px;transform:translateX(-50%);
    width:56px;height:20px;border-radius:3px;
    background:linear-gradient(180deg,#caa455,#7c5a26);
  }

  /* drifting light streaks / lens flare lines */
  .streak{position:absolute;border-radius:50%;mix-blend-mode:screen;pointer-events:none;}
  .streak.a{left:54%;top:18%;width:520px;height:14px;transform:rotate(-22deg);
    background:linear-gradient(90deg,transparent,rgba(255,231,182,0.55),transparent);filter:blur(2px);}
  .streak.b{left:40%;top:64%;width:680px;height:10px;transform:rotate(-16deg);
    background:linear-gradient(90deg,transparent,rgba(255,210,140,0.30),transparent);filter:blur(3px);}
  .flare{position:absolute;left:71%;top:26%;width:160px;height:160px;border-radius:50%;
    background:radial-gradient(circle, rgba(255,240,205,0.9) 0%, rgba(255,210,140,0.35) 22%, transparent 60%);
    mix-blend-mode:screen;filter:blur(2px);}

  /* dust motes */
  .motes{position:absolute;inset:0;mix-blend-mode:screen;opacity:.6;
    background-image:
      radial-gradient(1.5px 1.5px at 30% 40%, rgba(255,240,210,.9), transparent),
      radial-gradient(1.5px 1.5px at 65% 30%, rgba(255,235,200,.7), transparent),
      radial-gradient(1px 1px at 78% 55%, rgba(255,245,220,.8), transparent),
      radial-gradient(1.5px 1.5px at 45% 70%, rgba(255,230,190,.6), transparent),
      radial-gradient(1px 1px at 22% 62%, rgba(255,240,210,.7), transparent),
      radial-gradient(1px 1px at 58% 78%, rgba(255,238,205,.5), transparent);}

  /* ===== Vignette + grain ===== */
  .vignette{position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(115% 100% at 50% 45%, transparent 52%, rgba(0,0,0,0.55) 86%, rgba(0,0,0,0.85) 100%);}
  .grain{position:absolute;inset:0;pointer-events:none;opacity:.09;mix-blend-mode:overlay;}
  .grain svg{width:100%;height:100%;}

  /* ===== Letterbox bars (cinematic) ===== */
  .bar{position:absolute;left:0;right:0;height:54px;background:#040302;z-index:40;}
  .bar.top{top:0;border-bottom:1px solid rgba(214,168,86,0.10);}
  .bar.bottom{bottom:0;border-top:1px solid rgba(214,168,86,0.10);}

  /* ===== Chrome / Nav ===== */
  .nav{position:absolute;left:0;right:0;top:54px;height:64px;z-index:30;
    display:flex;align-items:center;justify-content:space-between;padding:0 56px;}
  .brand{font-family:"Bodoni Moda",serif;font-weight:500;font-size:20px;letter-spacing:.30em;
    text-transform:uppercase;color:#F2E8D4;padding-left:.30em;}
  .nav-links{display:flex;gap:40px;}
  .nav-links a{font-family:"Cormorant",serif;font-size:14px;letter-spacing:.22em;text-transform:uppercase;
    color:rgba(234,224,207,0.62);text-decoration:none;}

  /* ===== Hero copy block ===== */
  .copy{position:absolute;left:56px;top:50%;transform:translateY(-50%);z-index:30;max-width:520px;}
  .eyebrow{font-family:"Cormorant",serif;font-size:13px;letter-spacing:.34em;text-transform:uppercase;
    color:#D6A856;margin:0 0 26px;padding-left:.34em;
    display:flex;align-items:center;gap:16px;}
  .eyebrow::before{content:"";width:42px;height:1px;background:linear-gradient(90deg,#D6A856,transparent);}
  .headline{font-family:"Bodoni Moda",serif;font-weight:400;color:#F4ECDB;margin:0;
    font-size:84px;line-height:0.98;letter-spacing:-0.01em;
    text-shadow:0 18px 60px rgba(0,0,0,0.6);}
  .headline em{font-style:italic;color:#E7CF9C;}
  .sub{font-family:"Cormorant",serif;font-weight:400;font-size:20px;line-height:1.55;
    color:rgba(234,224,207,0.66);margin:28px 0 40px;max-width:400px;}
  .cta{display:inline-flex;align-items:center;gap:14px;text-decoration:none;
    font-family:"Cormorant",serif;font-size:14px;letter-spacing:.26em;text-transform:uppercase;
    color:#F2E8D4;padding-bottom:8px;border-bottom:1px solid rgba(214,168,86,0.55);padding-left:.26em;}
  .cta .arr{display:inline-block;width:30px;height:1px;background:#D6A856;position:relative;}
  .cta .arr::after{content:"";position:absolute;right:0;top:-3px;width:7px;height:7px;
    border-top:1px solid #D6A856;border-right:1px solid #D6A856;transform:rotate(45deg);}

  /* footer meta */
  .meta{position:absolute;right:56px;bottom:70px;z-index:30;text-align:right;
    font-family:"Cormorant",serif;font-size:12px;letter-spacing:.28em;text-transform:uppercase;
    color:rgba(234,224,207,0.42);line-height:2;}
  .scrollcue{position:absolute;left:50%;bottom:66px;transform:translateX(-50%);z-index:30;
    font-family:"Cormorant",serif;font-size:11px;letter-spacing:.4em;text-transform:uppercase;
    color:rgba(234,224,207,0.40);}
</style>
</head>
<body>
  <div class="frame">
    <div class="scene">
      <div class="layer-base"></div>
      <div class="layer-key"></div>
      <div class="layer-fill"></div>

      <div class="subject">
        <div class="cap"></div>
        <div class="flacon"></div>
      </div>

      <div class="flare"></div>
      <div class="streak a"></div>
      <div class="streak b"></div>
      <div class="motes"></div>
    </div>

    <div class="vignette"></div>
    <div class="grain">
      <svg xmlns="http://www.w3.org/2000/svg">
        <filter id="grainFilter1">
          <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
          <feColorMatrix type="saturate" values="0"/>
        </filter>
        <rect width="100%" height="100%" filter="url(#grainFilter1)"/>
      </svg>
    </div>

    <div class="bar top"></div>
    <div class="bar bottom"></div>

    <nav class="nav">
      <div class="brand">V&eacute;raux</div>
      <div class="nav-links">
        <a href="#">Maison</a>
        <a href="#">Collections</a>
        <a href="#">L&rsquo;Atelier</a>
        <a href="#">Boutique</a>
      </div>
    </nav>

    <div class="copy">
      <p class="eyebrow">Eau de Parfum &mdash; No. VII</p>
      <h1 class="headline">Liquid<br><em>Gold</em>, Bottled.</h1>
      <p class="sub">An amber chiaroscuro of saffron, oud and warm vanilla &mdash; composed in Grasse, aged in candlelight.</p>
      <a class="cta" href="#">Discover the Scent <span class="arr"></span></a>
    </div>

    <div class="meta">Grasse &middot; Paris<br>Maison Founded MCMXXIV</div>
    <div class="scrollcue">Scroll</div>
  </div>
</body>
</html>
